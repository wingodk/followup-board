<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>팔로업 보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{margin:0;background:#0A0A0F}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPABASE_URL = "https://udzouwyveoorahjnbleb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkem91d3l2ZW9vcmFoam5ibGViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODU1NTYsImV4cCI6MjA5NDA2MTU1Nn0.QCIdSM27AHj-3tVSZ0mhV-Rd8UXd1Ll7dkPlg4LRNwc";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const todayKey = () => new Date().toISOString().slice(0, 10);
const fmtTab = k => new Date(k+"T00:00:00").toLocaleDateString("ko-KR",{month:"short",day:"numeric",weekday:"short"});
const fmtFull = k => new Date(k+"T00:00:00").toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"});

function normalize(s){return s.replace(/\s+/g," ").replace(/[^\w가-힣]/g,"").toLowerCase();}
function isSimilar(a,b){
const na=normalize(a),nb=normalize(b);
if(na===nb)return true;
if(na.length<6||nb.length<6)return false;
return na.includes(nb)||nb.includes(na);
}

const PC={
high: {label:"긴급", color:"#FF4444",bg:"rgba(255,68,68,0.12)"},
medium:{label:"오늘", color:"#FF9500",bg:"rgba(255,149,0,0.12)"},
low: {label:"나중에",color:"#34C759",bg:"rgba(52,199,89,0.12)"},
};

async function fetchTodos(slackText, apiKey){
const prompt=[
"다음 슬랙 요약 텍스트에서 팔로업이 필요한 할 일 목록을 추출해줘.",
"각 항목은 JSON 배열로만 반환하고, 다른 텍스트는 절대 포함하지 마.",
"",
'형식: [{"task":"할 일 내용 (간결하게)","context":"관련 슬랙 채널 또는 배경 (1줄)","priority":"high|medium|low","assignee":"담당자 이름 또는 null"}]',
"",
"priority 기준:",
"- high: 즉시 처리 필요, 블로커, 긴급",
"- medium: 오늘 안에 처리",
"- low: 이번 주 내 처리",
"",
"슬랙 요약:",
slackText,
].join("\n");
const res=await fetch("https://api.anthropic.com/v1/messages",{
method:"POST",
headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4096,messages:[{role:"user",content:prompt}]}),
});
const data=await res.json();
if(data.error)throw new Error("API 오류: "+data.error.message);
const raw=data.content?.find(b=>b.type==="text")?.text||"";
if(!raw)throw new Error("빈 응답");
let cleaned=raw.replace(/json|/g,"").trim();
const s=cleaned.indexOf("["),e=cleaned.lastIndexOf("]");
if(s!==-1&&e!==-1)cleaned=cleaned.slice(s,e+1);
try{return JSON.parse(cleaned);}
catch{
const lb=cleaned.lastIndexOf("}");
if(lb===-1)throw new Error("JSON 복구 불가");
let rec=cleaned.slice(0,lb+1);
if(!rec.trimStart().startsWith("["))rec="["+rec;
return JSON.parse(rec+"]");
}
}
function App(){
const [todos,setTodos]=useState([]);
const [loading,setLoading]=useState(false);
const [dbLoading,setDbLoading]=useState(true);
const [error,setError]=useState("");
const [activeTab,setActiveTab]=useState(todayKey());
const [filter,setFilter]=useState("all");
const [input,setInput]=useState("");
const [showInput,setShowInput]=useState(false);
const [expandedId,setExpandedId]=useState(null);
const [apiKey,setApiKey]=useState(()=>localStorage.getItem("anthropic_api_key")||"");
const [showApiInput,setShowApiInput]=useState(false);
const textareaRef=useRef(null);

const loadAll=useCallback(async()=>{
setDbLoading(true);
const {data,error}=await sb.from("todos").select("*").order("added_at",{ascending:false});
if(error)setError("DB 로드 실패: "+error.message);
else setTodos(data||[]);
setDbLoading(false);
},[]);

useEffect(()=>{loadAll();},[loadAll]);

const today=todayKey();
const tabs=[...new Set(todos.map(t=>t.date))].sort((a,b)=>b.localeCompare(a));
if(!tabs.includes(today))tabs.unshift(today);
const currentTodos=todos.filter(t=>t.date===activeTab);
const counts={all:currentTodos.filter(t=>!t.done).length,high:currentTodos.filter(t=>t.priority==="high"&&!t.done).length,medium:currentTodos.filter(t=>t.priority==="medium"&&!t.done).length,low:currentTodos.filter(t=>t.priority==="low"&&!t.done).length,done:currentTodos.filter(t=>t.done).length};
const carryoverCount=currentTodos.filter(t=>!t.done&&t.carryover).length;
const newCount=currentTodos.filter(t=>!t.done&&!t.carryover).length;
const progress=currentTodos.length?Math.round((counts.done/currentTodos.length)*100):0;
const filtered=currentTodos.filter(t=>{
if(filter==="done")return t.done;
if(filter==="carryover")return !t.done&&t.carryover;
if(filter==="new")return !t.done&&!t.carryover;
if(["high","medium","low"].includes(filter))return t.priority===filter&&!t.done;
return !t.done;
});

const handleImport=async()=>{
if(!input.trim())return;
if(!apiKey){setError("🔑 API 키를 먼저 입력해주세요.");return;}
setLoading(true);setError("");
try{
const parsed=await fetchTodos(input,apiKey);
const prevTasks=todos.filter(t=>t.date!==today&&!t.done).map(t=>t.task);
const newTodos=parsed.map((item,i)=>({id:today+"-"+Date.now()+"-"+i,date:today,task:item.task,context:item.context||"",priority:item.priority||"medium",assignee:item.assignee||null,done:false,carryover:prevTasks.some(pt=>isSimilar(pt,item.task)),added_at:new Date().toISOString()}));
const existingTasks=todos.filter(t=>t.date===today).map(t=>t.task);
const deduped=newTodos.filter(n=>!existingTasks.some(et=>isSimilar(et,n.task)));
if(deduped.length===0){setError("새로운 항목이 없어요 (모두 중복)");setLoading(false);return;}
const {error}=await sb.from("todos").insert(deduped);
if(error)throw new Error("DB 저장 실패: "+error.message);
setTodos(prev=>[...deduped,...prev]);
setActiveTab(today);setInput("");setShowInput(false);
}catch(e){setError("오류: "+e.message);}
finally{setLoading(false);}
};

const toggle=async(id,done)=>{await sb.from("todos").update({done:!done}).eq("id",id);setTodos(prev=>prev.map(t=>t.id===id?{...t,done:!done}:t));};
const remove=async(id)=>{await sb.from("todos").delete().eq("id",id);setTodos(prev=>prev.filter(t=>t.id!==id));};
const clearDone=async()=>{const ids=currentTodos.filter(t=>t.done).map(t=>t.id);if(ids.length)await sb.from("todos").delete().in("id",ids);setTodos(prev=>prev.filter(t=>!ids.includes(t.id)));};
const saveApiKey=val=>{localStorage.setItem("anthropic_api_key",val);setApiKey(val);setShowApiInput(false);};

return(
<div style={{minHeight:"100vh",background:"#0A0A0F",fontFamily:"'DM Mono','Courier New',monospace",color:"#E8E8E8"}}>
<style>{@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap'); *{box-sizing:border-box;margin:0;padding:0} ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2A2A3A;border-radius:2px} .tbtn{transition:all .15s;cursor:pointer;border:none;white-space:nowrap}.tbtn:hover{opacity:.85} .fbtn{transition:all .15s;cursor:pointer;border:none}.fbtn:hover{opacity:.8} .item{transition:background .15s}.item:hover{background:rgba(255,255,255,.04)!important} .chk{transition:all .15s;cursor:pointer;border:none;background:none}.chk:hover{transform:scale(1.1)} textarea:focus,input:focus{outline:none} .pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}} .slide{animation:slin .25s ease}@keyframes slin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}} .fin{animation:fin .3s ease}@keyframes fin{from{opacity:0}to{opacity:1}}}</style>

<div style={{borderBottom:"1px solid #1A1A2E",padding:"18px 24px 14px",position:"sticky",top:0,background:"#0A0A0F",zIndex:20}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>
<div>
<div style={{fontSize:"10px",letterSpacing:".15em",color:"#4A4A6A",textTransform:"uppercase",marginBottom:"3px"}}>Slack → Followup</div>
<div style={{fontFamily:"'Syne',sans-serif",fontSize:"20px",fontWeight:800,letterSpacing:"-.5px"}}>팔로업 보드</div>
</div>
<div style={{display:"flex",alignItems:"center",gap:"10px"}}>
<button onClick={()=>setShowApiInput(v=>!v)} style={{background:apiKey?"rgba(52,199,89,.15)":"rgba(255,149,0,.15)",border:"1px solid "+(apiKey?"rgba(52,199,89,.3)":"rgba(255,149,0,.3)"),borderRadius:"8px",padding:"5px 10px",cursor:"pointer",fontSize:"11px",color:apiKey?"#34C759":"#FF9500"}}>
🔑 {apiKey?"API 연결됨":"API 키 필요"}
</button>
<div style={{position:"relative",width:46,height:46}}>
<svg width="46" height="46" style={{transform:"rotate(-90deg)"}}>
<circle cx="23" cy="23" r="17" fill="none" stroke="#1A1A2E" strokeWidth="3"/>
<circle cx="23" cy="23" r="17" fill="none" stroke="#7C6FCD" strokeWidth="3" strokeDasharray={String(2Math.PI17)} strokeDashoffset={String(2Math.PI17*(1-progress/100))} strokeLinecap="round" style={{transition:"stroke-dashoffset .5s ease"}}/>
</svg>
<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"#C0B8FF"}}>{progress}%</div>
</div>
</div>
</div>

{showApiInput&&(
<div className="slide" style={{background:"#111118",borderRadius:"10px",border:"1px solid #2A2A4A",padding:"12px",marginBottom:"12px"}}>
<div style={{fontSize:"11px",color:"#7A7A9A",marginBottom:"8px"}}>Anthropic API 키 입력 (이 브라우저에만 저장됩니다)</div>
<div style={{display:"flex",gap:"8px"}}>
<input type="password" id="apiKeyInput" defaultValue={apiKey} placeholder="sk-ant-api03-..." style={{flex:1,background:"#0A0A0F",border:"1px solid #2A2A4A",borderRadius:"6px",padding:"7px 10px",color:"#E8E8E8",fontSize:"12px",fontFamily:"inherit"}}/>
<button onClick={()=>saveApiKey(document.getElementById("apiKeyInput").value.trim())} style={{padding:"7px 14px",borderRadius:"6px",border:"none",background:"#7C6FCD",color:"#fff",fontSize:"12px",cursor:"pointer"}}>저장</button>
</div>
</div>
)}

<div style={{display:"flex",gap:"5px",overflowX:"auto",paddingBottom:"2px"}}>
{tabs.map(key=>{
const isActive=key===activeTab,isToday=key===today;
const pending=todos.filter(t=>t.date===key&&!t.done).length;
return(
<div key={key} style={{display:"flex",alignItems:"center",gap:"1px",flexShrink:0}}>
<button className="tbtn" onClick={()=>{setActiveTab(key);setFilter("all");}} style={{padding:"5px 11px",borderRadius:"20px",background:isActive?(isToday?"rgba(124,111,205,.25)":"rgba(255,255,255,.07)"):"transparent",border:isActive?("1px solid "+(isToday?"rgba(124,111,205,.5)":"#2A2A4A")):"1px solid transparent",color:isActive?"#D8D8E8":"#4A4A6A",fontSize:"11px",display:"flex",alignItems:"center",gap:"5px"}}>
{isToday&&<span style={{fontSize:"8px",color:"#7C6FCD",letterSpacing:".1em"}}>TODAY</span>}
{fmtTab(key)}
{pending>0&&<span style={{fontSize:"9px",background:isActive?"#7C6FCD":"#2A2A4A",color:"#fff",borderRadius:"10px",padding:"1px 5px"}}>{pending}</span>}
</button>
{!isToday&&(
<button onClick={async()=>{if(!window.confirm(fmtFull(key)+" 탭을 삭제할까요?"))return;const ids=todos.filter(t=>t.date===key).map(t=>t.id);if(ids.length)await sb.from("todos").delete().in("id",ids);setTodos(prev=>prev.filter(t=>t.date!==key));setActiveTab(tabs.filter(t=>t!==key)[0]||today);}}
style={{background:"none",border:"none",color:"#2A2A4A",cursor:"pointer",fontSize:"12px",padding:"2px 3px",lineHeight:1}}
onMouseEnter={e=>e.target.style.color="#FF4444"} onMouseLeave={e=>e.target.style.color="#2A2A4A"}>×</button>
)}
</div>
);
})}
</div>
</div>

<div style={{maxWidth:700,margin:"0 auto",padding:"18px 18px 80px"}}>
{dbLoading&&<div style={{textAlign:"center",padding:"40px",color:"#4A4A6A",fontSize:"12px"}}><span className="pulse">◉</span> 데이터 불러오는 중...</div>}
{!dbLoading&&(<>
<div style={{fontSize:"11px",color:"#4A4A6A",marginBottom:"14px"}}>{fmtFull(activeTab)}{activeTab===today&&<span style={{marginLeft:"8px",color:"#7C6FCD"}}>● 오늘</span>}</div>
<div style={{display:"flex",gap:"5px",marginBottom:"14px",flexWrap:"wrap"}}>
{[{key:"all",label:"전체",count:counts.all},{key:"new",label:"✦ 신규",count:newCount,color:"#A78BFA"},{key:"carryover",label:"↩ 이월",count:carryoverCount,color:"#FBBF24"},{key:"high",label:"긴급",count:counts.high,color:"#FF4444"},{key:"medium",label:"오늘",count:counts.medium,color:"#FF9500"},{key:"low",label:"나중에",count:counts.low,color:"#34C759"},{key:"done",label:"완료",count:counts.done,color:"#4A4A6A"}].map(({key,label,count,color})=>(
<button key={key} className="fbtn" onClick={()=>setFilter(key)} style={{padding:"5px 11px",borderRadius:"20px",fontSize:"11px",background:filter===key?"rgba(124,111,205,.2)":"#111118",border:"1px solid "+(filter===key?"rgba(124,111,205,.4)":"#1A1A2E"),color:filter===key?(color||"#C0B8FF"):"#4A4A6A",display:"flex",alignItems:"center",gap:"5px"}}>
{label}<span style={{fontSize:"10px",fontWeight:700,color:filter===key?(color||"#C0B8FF"):"#3A3A5A"}}>{count}</span>
</button>
))}
</div>
{(newCount>0||carryoverCount>0)&&currentTodos.length>0&&(
<div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
{newCount>0&&<div style={{flex:1,padding:"7px 12px",borderRadius:"8px",background:"rgba(167,139,250,.08)",border:"1px solid rgba(167,139,250,.2)",fontSize:"11px",color:"#A78BFA",display:"flex",justifyContent:"space-between"}}><span>✦ 신규 추가</span><strong>{newCount}건</strong></div>}
{carryoverCount>0&&<div style={{flex:1,padding:"7px 12px",borderRadius:"8px",background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.2)",fontSize:"11px",color:"#FBBF24",display:"flex",justifyContent:"space-between"}}><span>↩ 이전 날짜에서 이월</span><strong>{carryoverCount}건</strong></div>}
</div>
)}
{activeTab===today&&(
<div>
<button onClick={()=>{setShowInput(v=>!v);setTimeout(()=>textareaRef.current&&textareaRef.current.focus(),50);}} style={{width:"100%",padding:"11px",borderRadius:"10px",marginBottom:"11px",background:showInput?"#111118":"linear-gradient(135deg,#1A1A3E,#2A1A4E)",border:"1px solid "+(showInput?"#2A2A4A":"rgba(124,111,205,.3)"),color:showInput?"#4A4A6A":"#C0B8FF",fontSize:"12px",cursor:"pointer",letterSpacing:".05em",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",transition:"all .2s"}}>
<span>{showInput?"✕":"⚡"}</span>{showInput?"닫기":"슬랙 요약 붙여넣기"}
</button>
{showInput&&(
<div className="slide" style={{background:"#111118",borderRadius:"10px",border:"1px solid #2A2A4A",padding:"12px",marginBottom:"12px"}}>
<textarea ref={textareaRef} value={input} onChange={e=>setInput(e.target.value)} placeholder="슬랙 요약 텍스트를 여기에 붙여넣으세요..." style={{width:"100%",minHeight:"100px",background:"transparent",border:"none",color:"#C0C0D0",fontSize:"12px",lineHeight:"1.6",resize:"vertical",fontFamily:"inherit"}}/>
<div style={{display:"flex",justifyContent:"flex-end",marginTop:"8px"}}>
<button onClick={handleImport} disabled={loading||!input.trim()} style={{padding:"8px 16px",borderRadius:"8px",border:"none",background:loading?"#2A2A4A":"linear-gradient(135deg,#7C6FCD,#A855F7)",color:"#fff",fontSize:"12px",cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"6px"}}>
{loading?<span><span className="pulse">◉</span> 분석 중...</span>:<span>✦ 할 일로 변환</span>}
</button>
</div>
</div>
)}
</div>
)}
{error&&<div style={{background:"rgba(255,68,68,.1)",border:"1px solid rgba(255,68,68,.3)",borderRadius:"8px",padding:"9px 12px",fontSize:"11px",color:"#FF8888",marginBottom:"12px"}}>{error}</div>}
<div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
{filtered.length===0&&<div style={{textAlign:"center",padding:"40px 24px",color:"#2A2A4A",fontSize:"12px"}}><div style={{fontSize:"28px",marginBottom:"10px",opacity:.3}}>◎</div>{filter==="done"?"완료된 항목 없음":"항목 없음"}</div>}
{filtered.map(todo=>{
const pc=PC[todo.priority]||PC.medium,isExpanded=expandedId===todo.id;
return(
<div key={todo.id} className="item fin" style={{background:todo.done?"rgba(255,255,255,.02)":"#111118",borderRadius:"10px",border:"1px solid "+(todo.done?"#1A1A2E":todo.carryover?"rgba(251,191,36,.18)":"#1E1E30"),padding:"11px 13px",opacity:todo.done?.5:1}}>
<div style={{display:"flex",alignItems:"flex-start",gap:"9px"}}>
<button className="chk" onClick={()=>toggle(todo.id,todo.done)} style={{width:17,height:17,borderRadius:"5px",flexShrink:0,marginTop:"2px",border:"1.5px solid "+(todo.done?"#34C759":pc.color),background:todo.done?"rgba(52,199,89,.2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#34C759",fontSize:"10px"}}>{todo.done?"✓":""}</button>
<div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setExpandedId(isExpanded?null:todo.id)}>
<div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
{!todo.done&&(todo.carryover?<span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"4px",background:"rgba(251,191,36,.15)",color:"#FBBF24"}}>↩이월</span>:<span style={{fontSize:"9px",padding:"1px 5px",borderRadius:"4px",background:"rgba(167,139,250,.15)",color:"#A78BFA"}}>✦NEW</span>)}
<span style={{fontSize:"13px",fontWeight:500,color:todo.done?"#3A3A5A":"#D8D8E8",textDecoration:todo.done?"line-through":"none"}}>{todo.task}</span>
</div>
{isExpanded&&todo.context&&<div className="slide" style={{marginTop:"6px",fontSize:"11px",color:"#5A5A7A",lineHeight:"1.5",borderLeft:"2px solid "+pc.color,paddingLeft:"8px"}}>{todo.context}</div>}
</div>
<div style={{display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>
{todo.assignee&&<span style={{fontSize:"10px",color:"#5A5A7A"}}>@{todo.assignee}</span>}
<span style={{fontSize:"9px",padding:"2px 6px",borderRadius:"20px",background:pc.bg,color:pc.color,textTransform:"uppercase"}}>{pc.label}</span>
<button onClick={()=>remove(todo.id)} style={{background:"none",border:"none",color:"#2A2A4A",cursor:"pointer",fontSize:"13px",padding:"0 2px",lineHeight:1}} onMouseEnter={e=>e.target.style.color="#FF4444"} onMouseLeave={e=>e.target.style.color="#2A2A4A"}>×</button>
</div>
</div>
</div>
);
})}
</div>
{counts.done>0&&<button onClick={clearDone} style={{marginTop:"14px",width:"100%",padding:"8px",background:"transparent",border:"1px dashed #2A2A3A",borderRadius:"8px",color:"#3A3A5A",fontSize:"11px",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>{e.target.style.borderColor="#FF4444";e.target.style.color="#FF6666";}} onMouseLeave={e=>{e.target.style.borderColor="#2A2A3A";e.target.style.color="#3A3A5A";}}>완료 항목 {counts.done}개 삭제</button>}
</>)}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
